<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刹那の○斬り</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #1a1a1a; 
            color: white;
            margin: 0; 
            transition: background-color 0.1s;
        }
        .card { 
            background: #2a2a2a; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            text-align: center; 
            border: 1px solid #444;
        }
        h2 { margin-bottom: 1.5rem; color: #00d4ff; }
        .inputs { margin-bottom: 1.5rem; font-size: 1.1rem; }
        
        /* ↓ 修正箇所：不要な input { 行を削除しました */
        input[type="number"] { 
            width: 70px; 
            padding: 8px; 
            font-size: 1.1rem; 
            border-radius: 8px; 
            border: none; 
            text-align: center;
            background: #444;
            color: white;
        }
        button { 
            padding: 18px 40px; 
            font-size: 1.4rem; 
            font-weight: bold;
            cursor: pointer; 
            background: linear-gradient(135deg, #007bff, #00d4ff);
            color: white; 
            border: none; 
            border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,123,255,0.4);
            transition: transform 0.1s, opacity 0.2s; 
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #555; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
        /*.status { margin-top: 25px; font-size: 1.5rem; font-weight: bold; height: 1.5rem; }*/
        .flash { background-color: #fff !important; }
        .option { margin-top: 1rem; font-size: 1.2rem; color: #ddd; }
        .option input[type="checkbox"] { width: auto; padding: 0; margin-right: 0.35rem; vertical-align: middle; transform: scale(1.25); }
        .credit { margin-top: 1.2rem; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2>刹那の◯斬り</h2>
    <div class="inputs">
        <input type="number" id="minSec" value="1.0" step="0.5" min="0.1"> 秒 〜 
        <input type="number" id="maxSec" value="10.0" step="1" max="60"> 秒
    </div>
    
    <button id="startBtn">START</button>
    <div class="status" id="statusText"></div>
    <div class="option">
        <label>
            <input type="checkbox" id="shakiinToggle" checked>
            「シャキーン」音を再生する
        </label>
    </div>
   
</div>
 <div class="credit">音源： On-Jin ～音人～ , OtoLogic</div>
<script>
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('statusText');
    const minInput = document.getElementById('minSec');
    const maxInput = document.getElementById('maxSec');
    const shakiinToggle = document.getElementById('shakiinToggle');
    const body = document.body;

    const shotAudio = new Audio('スターターピストル.mp3');
    shotAudio.preload = 'auto';
    const lightAudio = new Audio('Onoma-Syakiin05-2(Light).mp3');
    lightAudio.preload = 'auto';

    startBtn.addEventListener('click', () => {
        const min = parseFloat(minInput.value) * 1000;
        const max = parseFloat(maxInput.value) * 1000;
        
        if (min >= max) {
            alert("最大秒数は最小秒数より大きく設定してください。");
            return;
        }

        startBtn.disabled = true;
        startBtn.innerText = "WAITING";
        /* statusText.innerText = "集中";
        statusText.style.color = "#ffcc00"; */

        const randomFactor = Math.pow(Math.random(), 2);
        const delay = randomFactor * (max - min) + min;

        setTimeout(() => {
            shotAudio.currentTime = 0;
            shotAudio.play();
            
            setTimeout(() => {
                if (shakiinToggle.checked) {
                    lightAudio.currentTime = 0;
                    lightAudio.play();
                }
            }, 500);

            body.classList.add('flash');
            statusText.innerText = "";
            
            setTimeout(() => {
                body.classList.remove('flash');
                startBtn.disabled = false;
                startBtn.innerText = "START";
            }, 200);

        }, delay);
    });
</script>

</body>
</html>
